services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: natsdoll
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d natsdoll"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - api_ws_node_modules:/app/apps/api/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/natsdoll
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: dev-secret-key
      SEED_DEMO_PRODUCTS: "true"
    env_file:
      - apps/api/.env
    command: sh -c "rm -rf /app/node_modules/.package-lock.json 2>/dev/null; npm ci && npx -w apps/api prisma migrate deploy && npm run generate -w apps/api && (npx -w apps/api prisma db seed || true) && npm run dev -w apps/api"
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_ws_node_modules:/app/apps/web/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      NUXT_DEV_PROXY_TARGET: http://api:3000
      NUXT_API_INTERNAL_URL: http://api:3000
    command: sh -c "rm -rf /app/node_modules/.package-lock.json 2>/dev/null; npm ci -w apps/web && npm run dev -w apps/web"
    depends_on:
      - api

  wp-db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: wordpress
    volumes:
      - wp_db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6
    ports:
      - "127.0.0.1:8080:80"
    environment:
      WORDPRESS_DB_HOST: wp-db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./infra/wordpress/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./infra/wordpress/mu-plugins-dev/natsdoll-dev-http-auth.php:/var/www/html/wp-content/mu-plugins/natsdoll-dev-http-auth.php
    depends_on:
      - wp-db

volumes:
  postgres_data:
  api_node_modules:
  api_ws_node_modules:
  web_node_modules:
  web_ws_node_modules:
  wp_data:
  wp_db_data:
