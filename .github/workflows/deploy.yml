name: Deploy to production

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: natsdoll_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d natsdoll_test"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/natsdoll_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint apps/api/src apps/web/app apps/web/src --max-warnings=0

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Typecheck API
        run: node --max-old-space-size=8192 ./node_modules/typescript/bin/tsc --noEmit -p apps/api

      - name: Typecheck Web
        run: npx nuxt typecheck
        working-directory: apps/web
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Unit tests
        run: npm run test:run -w apps/api

      - name: Integration tests
        run: npm run test:int -w apps/api

      - name: Web unit tests
        run: npx vitest run --root apps/web

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: natsdoll
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d natsdoll"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/natsdoll
      JWT_SECRET: e2e-jwt-secret
      HMAC_SECRET: e2e-hmac-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Apply migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma

      - name: Seed demo data
        run: npx prisma db seed
        working-directory: apps/api
        env:
          SEED_DEMO_PRODUCTS: 'true'
          ADMIN_EMAIL: admin@e2e.local
          ADMIN_PASSWORD: e2e-admin-password
          YANDEX_STORAGE_URL: https://storage.yandexcloud.net/natsdoll

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run E2E tests
        working-directory: apps/web
        run: |
          (cd ../api && npx tsx src/main.ts &)
          ok=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health >/dev/null; then ok=1; break; fi
            sleep 2
          done
          if [ "$ok" != "1" ]; then echo "API did not become healthy" && exit 1; fi
          npx playwright test

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/pozner2024/natsdoll/api:latest
            ghcr.io/pozner2024/natsdoll/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/pozner2024/natsdoll/web:latest
            ghcr.io/pozner2024/natsdoll/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    runs-on: ubuntu-latest
    needs: [build, e2e]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /home/natalia/natsdoll
            echo "=== disk before cleanup ===" && df -h /
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            docker network prune -f || true
            echo "=== disk after cleanup ===" && df -h /
            git pull
            echo $GHCR_TOKEN | docker login ghcr.io -u pozner2024 --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm migrate
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml up -d --force-recreate caddy
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
