name: Manual redeploy with image cleanup

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /home/natalia/natsdoll
            git pull
            echo $GHCR_TOKEN | docker login ghcr.io -u pozner2024 --password-stdin
            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml stop web api
            docker compose -f docker-compose.prod.yml rm -f web api
            docker image rm -f ghcr.io/pozner2024/natsdoll/api:latest || true
            docker image prune -af
            df -h /
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm migrate
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            df -h /
            docker compose -f docker-compose.prod.yml ps
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
