services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/pozner2024/natsdoll/api:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      HMAC_SECRET: ${HMAC_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      YANDEX_S3_ACCESS_KEY: ${YANDEX_S3_ACCESS_KEY}
      YANDEX_S3_SECRET_KEY: ${YANDEX_S3_SECRET_KEY}
      YANDEX_S3_BUCKET: ${YANDEX_S3_BUCKET}
      YANDEX_S3_ENDPOINT: ${YANDEX_S3_ENDPOINT}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYMENT_ENCRYPTION_KEY: ${PAYMENT_ENCRYPTION_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      WOO_BASE_URL: ${WOO_BASE_URL}
      WOO_CONSUMER_KEY: ${WOO_CONSUMER_KEY}
      WOO_CONSUMER_SECRET: ${WOO_CONSUMER_SECRET}
      WOO_WEBHOOK_SECRET: ${WOO_WEBHOOK_SECRET}
      WOO_PLACEHOLDER_PRODUCT_ID: ${WOO_PLACEHOLDER_PRODUCT_ID}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # ВНИМАНИЕ: rate limiter и счётчики хранятся в памяти процесса (см. shared/middleware/rateLimit.ts).
    # Запускать строго в одной реплике. Поле `deploy.replicas` в Compose stand-alone игнорируется,
    # поэтому НЕ ИСПОЛЬЗОВАТЬ `docker compose up --scale api=N` (N>1) — лимиты обойдут защиту.
    # Для горизонтального масштабирования вынести rate limit в Redis.

  web:
    image: ghcr.io/pozner2024/natsdoll/web:latest
    environment:
      NUXT_API_INTERNAL_URL: http://api:3000
      NUXT_PUBLIC_SITE_URL: ${FRONTEND_URL}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      WWW_ADDRESS: ${WWW_ADDRESS:-http://localhost:2080}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    image: ghcr.io/pozner2024/natsdoll/api:latest
    command: ["npx", "prisma", "migrate", "deploy", "--schema=apps/api/prisma/schema.prisma"]
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  umami_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${UMAMI_DB_USER}
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
      POSTGRES_DB: ${UMAMI_DB_NAME}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UMAMI_DB_USER} -d ${UMAMI_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-v2.20.2
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER}:${UMAMI_DB_PASSWORD}@umami_db:5432/${UMAMI_DB_NAME}
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami_db:
        condition: service_healthy
    restart: unless-stopped

  wp-db:
    image: mariadb:11
    # Тюнинг под VPS 2 ГБ: маленький buffer pool (БД WP крошечная), performance_schema
    # выключен (экономит ~100 МБ), скромный лимит коннекций. mem_limit — верхний потолок
    # против runaway, не жёсткая резервация (штатно MariaDB держится ~150–200 МБ).
    command: --innodb-buffer-pool-size=64M --performance-schema=OFF --max-connections=50
    mem_limit: 512m
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: ${WP_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - wp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  wordpress:
    image: wordpress:6
    mem_limit: 512m
    environment:
      WORDPRESS_DB_HOST: wp-db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_CONFIG_EXTRA: |
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') { $$_SERVER['HTTPS'] = 'on'; }
        define('WP_HOME', 'https://pay.natsdoll.com');
        define('WP_SITEURL', 'https://pay.natsdoll.com');
        define('DISALLOW_FILE_EDIT', true);
        define('WP_MEMORY_LIMIT', '128M');
        define('WP_MAX_MEMORY_LIMIT', '128M');
    volumes:
      - wp_data:/var/www/html
      - ./infra/wordpress/mu-plugins:/var/www/html/wp-content/mu-plugins:ro
    depends_on:
      wp-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  wp_data:
  wp_db_data:
  umami_db_data:
