services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/pozner2024/natsdoll/api:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      HMAC_SECRET: ${HMAC_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      YANDEX_S3_ACCESS_KEY: ${YANDEX_S3_ACCESS_KEY}
      YANDEX_S3_SECRET_KEY: ${YANDEX_S3_SECRET_KEY}
      YANDEX_S3_BUCKET: ${YANDEX_S3_BUCKET}
      YANDEX_S3_ENDPOINT: ${YANDEX_S3_ENDPOINT}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # ВНИМАНИЕ: rate limiter и счётчики хранятся в памяти процесса (см. shared/middleware/rateLimit.ts).
    # Запускать строго в одной реплике. Поле `deploy.replicas` в Compose stand-alone игнорируется,
    # поэтому НЕ ИСПОЛЬЗОВАТЬ `docker compose up --scale api=N` (N>1) — лимиты обойдут защиту.
    # Для горизонтального масштабирования вынести rate limit в Redis.

  web:
    image: ghcr.io/pozner2024/natsdoll/web:latest
    environment:
      NUXT_API_INTERNAL_URL: http://api:3000
      NUXT_PUBLIC_SITE_URL: ${FRONTEND_URL}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      WWW_ADDRESS: ${WWW_ADDRESS:-http://localhost:2080}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    image: ghcr.io/pozner2024/natsdoll/api:latest
    command: ["npx", "prisma", "migrate", "deploy", "--schema=apps/api/prisma/schema.prisma"]
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
